<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>winUbu — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .admin-wrap { max-width: 720px; margin: 60px auto; padding: 0 24px; position: relative; z-index: 1; }
  .login-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 30px; max-width: 380px; margin: 100px auto; text-align: center; position: relative; z-index: 1; }
  .login-box input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; }
  .login-error { color: var(--accent); font-size: 13px; min-height: 18px; }
  .admin-row { display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
  .admin-row span { font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
  .delete-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 5px 12px; border-radius: 999px; cursor: pointer; font-size: 12px; }
  .delete-btn:hover { background: var(--accent); color: #fff; }
  .logout-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 6px 14px; border-radius: 999px; cursor: pointer; font-size: 12px; }
</style>
</head>
<body>
  <div class="bg-logo"></div>

  <div id="loginView" class="login-box">
    <h2>Connexion admin</h2>
    <input type="text" id="username" placeholder="Identifiant">
    <input type="password" id="password" placeholder="Mot de passe">
    <button class="btn" id="loginBtn" style="width:100%; margin-top:10px;">Se connecter</button>
    <p class="login-error" id="loginError"></p>
  </div>

  <div id="adminView" class="admin-wrap" style="display:none;">
    <div class="manifest-head">
      <h2>Gestion des fichiers</h2>
      <button class="logout-btn" id="logoutBtn">Déconnexion</button>
    </div>
    <div id="adminFileList"></div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
